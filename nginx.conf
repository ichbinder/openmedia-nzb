server {
    listen 80;
    server_name _;
    server_tokens off;

    # Healthcheck
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # Serve NZB files: GET /nzb/{hash}.nzb
    location ~ ^/nzb/([a-f0-9]+)\.nzb$ {
        alias /usr/share/nginx/html/nzb/$1.nzb;
        default_type application/x-nzb;
        add_header X-Content-Type-Options nosniff always;
    }

    # Everything else → 404
    location / {
        default_type application/json;
        return 404 '{"error":"not found"}';
    }
}
