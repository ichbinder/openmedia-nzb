server {
    listen 80;
    server_name _;
    server_tokens off;

    # Healthcheck
    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    # Serve NZB files: GET /nzb/{hash}.nzb
    location ~ ^/nzb/([a-f0-9]+)\.nzb$ {
        alias /usr/share/nginx/html/nzb/$1.nzb;
        default_type application/x-nzb;
        add_header X-Content-Type-Options nosniff always;
    }

    # Reverse proxy to Node.js API for file management (PUT, DELETE, HEAD, LIST)
    location /files {
        proxy_pass http://api:4100/files;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 50m;
    }

    # Everything else → 404
    location / {
        default_type application/json;
        return 404 '{"error":"not found"}';
    }
}
