# Lokale Entwicklung OHNE NAS — nutzt einen lokalen Ordner statt SMB
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build

services:
  nginx:
    volumes:
      - ./data/nzb:/usr/share/nginx/html/nzb:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  api:
    volumes:
      - ./data/nzb:/data/nzb
    environment:
      - JWT_SECRET=${JWT_SECRET:-local-dev-secret}

# Überschreibt das CIFS-Volume mit nichts (lokaler Bind-Mount oben)
volumes:
  nzb-files:
    driver: local
