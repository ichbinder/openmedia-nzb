# Lokale Entwicklung OHNE NAS — nutzt einen lokalen Ordner statt SMB
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d

services:
  nzb-service:
    volumes:
      - ./nzb-files:/usr/share/nginx/html/nzb:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

# Überschreibt das CIFS-Volume mit nichts (lokaler Bind-Mount oben)
volumes:
  nzb-files:
    driver: local
