services:
  # nginx — serves NZB files via GET /nzb/{hash}.nzb (read-only)
  nginx:
    image: nginx:alpine
    container_name: openmedia-nzb-nginx
    ports:
      - "${NZB_NGINX_PORT:-3001}:80"
    volumes:
      - nzb-files:/usr/share/nginx/html/nzb:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      - api
    restart: unless-stopped

  # Node.js API — handles PUT/DELETE /files/{hash} (read-write)
  api:
    build: .
    container_name: openmedia-nzb-api
    ports:
      - "${NZB_API_PORT:-3002}:4100"
    volumes:
      - nzb-files:/data/nzb
    environment:
      - PORT=4100
      - NZB_STORAGE_DIR=/data/nzb
      - JWT_SECRET=${JWT_SECRET}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  nzb-files:
    driver: local
    driver_opts:
      type: cifs
      device: "//${SMB_HOST}/${SMB_SHARE}"
      o: "username=${SMB_USER},password=${SMB_PASSWORD},vers=${SMB_VERSION:-3.0},uid=1001,gid=1001"
