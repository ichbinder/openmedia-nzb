name: NZB Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: ci-test-secret
          NZB_STORAGE_DIR: /tmp/nzb-ci-test
          NODE_ENV: test

      - name: TypeScript type check
        run: npx tsc --noEmit

  hold-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check for hold label
        run: |
          if echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q '"hold"'; then
            echo "❌ PR has 'hold' label — merge is blocked."
            exit 1
          else
            echo "✅ No 'hold' label — merge allowed."
          fi
